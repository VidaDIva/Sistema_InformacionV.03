<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registro - Credenciales</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

            <h3 class="text-center mb-4">Credenciales de Acceso</h3>

            <form th:action="@{/cuenta/enviarCodigo}" method="post">

                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>

                    <input type="email" name="correo" class="form-control" placeholder="ejemplo@gmail.com" required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Contraseña</label>

                    <div class="input-group">

                        <input type="password" id="contrasena" name="contrasena" class="form-control"
                            onkeyup="medirSeguridad('contrasena','barra2','texto2')" required>

                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('contrasena')">
                            👁
                        </button>

                    </div>

                    <span>
                        Consejo: usa al menos 8 caracteres, números, mayúsculas y símbolos.
                    </span>

                    <div class="progress mt-2">
                        <div id="barra2" class="progress-bar" style="width:0%"></div>
                    </div>

                    <span id="texto2"></span>

                </div>

                <div class="mb-3">

                    <label class="form-label">Confirmar contraseña</label>

                    <div class="input-group">

                        <input type="password" id="confirmar" name="confirmar" class="form-control" required>

                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmar')">
                            👁
                        </button>

                    </div>

                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Enviar código de verificación
                    </button>
                </div>

            </form>

            <div class="text-danger text-center mt-3" th:text="${error}"></div>

            <div class="text-center mt-3">

                <a th:href="@{/cuenta/registro}" class="btn btn-outline-secondary w-100">
                    Volver a datos personales
                </a>

            </div>

        </div>
    </div>

    <script>

        function togglePassword(id) {
            const input = document.getElementById(id)
            input.type = input.type === "password" ? "text" : "password"
        }

        function medirSeguridad(inputId, barraId, textoId) {

            const pass = document.getElementById(inputId).value
            let fuerza = 0

            if (pass.length >= 8) fuerza++
            if (/[A-Z]/.test(pass)) fuerza++
            if (/[0-9]/.test(pass)) fuerza++
            if (/[^A-Za-z0-9]/.test(pass)) fuerza++

            const barra = document.getElementById(barraId)
            const texto = document.getElementById(textoId)

            let porcentaje = (fuerza / 4) * 100
            barra.style.width = porcentaje + "%"

            if (fuerza <= 1) {
                barra.className = "progress-bar bg-danger"
                texto.innerText = "Contraseña débil"
            }
            else if (fuerza <= 3) {
                barra.className = "progress-bar bg-warning"
                texto.innerText = "Contraseña media"
            }
            else {
                barra.className = "progress-bar bg-success"
                texto.innerText = "Contraseña fuerte"
            }

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
