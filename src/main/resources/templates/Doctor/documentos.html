<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Documentos Médicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef8f8;
            font-family: Poppins, sans-serif;
        }

        .card-box {
            background: white;
            border: none;
            border-radius: 25px;
            padding: 35px;
            margin-top: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .06);
        }

        .estado {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .pendiente {
            background: #fff3cd;
            color: #856404;
        }

        .revisado {
            background: #d1e7dd;
            color: #0f5132;
        }

        .examen {
            background: #f8d7da;
            color: #842029;
        }

        .btn-ver {
            border-radius: 30px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card-box">

            <h2 class="mb-4">
                Documentos enviados por pacientes
            </h2>

            <table class="table table-hover align-middle">

                <thead class="table-light">
                    <tr>
                        <th>Paciente</th>
                        <th>Tipo Documento</th>
                        <th>Nota Paciente</th>
                        <th>Archivo</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="doc : ${documentos}">

                        <td>
                            <span th:text="${doc.paciente.nombre + ' ' + doc.paciente.apellido}"></span>
                        </td>

                        <td th:text="${doc.tipoDocumento}">
                        </td>

                        <td th:text="${doc.nota}">
                        </td>

                        <td>
                            <a th:href="@{'/uploads/documentos/' + ${doc.nombreArchivo}}" target="_blank"
                                class="btn btn-outline-primary btn-sm btn-ver">
                                Ver archivo
                            </a>
                        </td>

                        <td>

                            <span th:if="${doc.estado.name()=='PENDIENTE'}" class="estado pendiente">
                                Pendiente
                            </span>

                            <span th:if="${doc.estado.name()=='REVISADO'}" class="estado revisado">
                                Revisado
                            </span>

                            <span th:if="${doc.estado.name()=='REQUIERE_EXAMEN'}" class="estado examen">
                                Solicita examen
                            </span>

                        </td>

                        <td>

                            <a th:href="@{/doctor/revisar/{id}(id=${doc.id})}" class="btn btn-success btn-sm">
                                Revisar
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

            <a th:href="@{/doctor/home}" class="btn btn-secondary mt-3">
                Volver
            </a>

        </div>
    </div>

</body>

</html>
