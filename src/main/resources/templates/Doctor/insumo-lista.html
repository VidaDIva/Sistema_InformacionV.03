<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Inventario de Insumos - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f4f9f8;
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 15px;
            border: none;
        }

        .table thead {
            background-color: #00796b;
            color: white;
        }

        /* Colores basados en tu Enum EstadoInsumo */
        .badge-entregado {
            background-color: #0d6efd;
            color: white;
        }

        /* Azul */
        .badge-usado {
            background-color: #198754;
            color: white;
        }

        /* Verde */
        .badge-desechado {
            background-color: #dc3545;
            color: white;
        }

        /* Rojo */

        .btn-home {
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-home:hover {
            background-color: #00796b;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-success">
                <i class="bi bi-box-seam-fill"></i> Insumos Asignados
            </h3>

            <a th:href="@{/doctor/home}" class="btn-home shadow-sm" title="Inicio">
                <i class="bi bi-house-door-fill"></i>
            </a>
        </div>

        <div class="card shadow p-4">
            <table class="table table-hover align-middle text-center">
                <thead>
                    <tr>
                        <th>Médico</th>
                        <th>Insumo</th>
                        <th>Cant.</th>
                        <th>Fecha Entrega</th>
                        <th>Área</th>
                        <th>Estado</th>

                    </tr>
                </thead>

                <tbody>
                    <tr th:each="i : ${insumos}">

                        <td th:text="${i.medico.nombre + ' ' + i.medico.apellido}"></td>

                        <td class="fw-bold text-dark" th:text="${i.nombreInsumo}"></td>

                        <td th:text="${i.cantidad}"></td>

                        <td th:text="${i.fechaEntrega}"></td>

                        <td th:text="${i.area != null ? i.area : 'N/A'}"></td>

                        <td>
                            <span th:if="${i.estado.name() == 'ENTREGADO'}"
                                class="badge badge-entregado">Entregado</span>

                            <span th:if="${i.estado.name() == 'USADO'}" class="badge badge-usado">Usado</span>

                            <span th:if="${i.estado.name() == 'DESECHADO'}"
                                class="badge badge-desechado">Desechado</span>
                        </td>


                    </tr>

                    <tr th:if="${#lists.isEmpty(insumos)}">
                        <td colspan="6" class="py-4 text-muted">
                            <i class="bi bi-info-circle me-1"></i> No tienes insumos asignados actualmente.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4 text-muted small">
            SaludSync - Módulo de Gestión de Insumos Hospitalarios
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
