<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lista de Vacunas - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f4f9f8;
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 15px;
            border: none;
        }

        .table thead {
            background-color: #00796b;
            color: white;
        }

        .badge-activo {
            background-color: #28a745;
        }

        .badge-vencido {
            background-color: #dc3545;
        }

        .badge-proximo {
            background-color: #ffc107;
            color: #212529;
        }

        .btn-home {
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: #00796b;
            color: white;
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-success">
            <i class="bi bi-patch-check-fill"></i> Lista de Vacunas
        </h3>

        <a th:href="@{/doctor/home}" class="btn-home shadow-sm" title="Inicio">
            <i class="bi bi-house-door-fill"></i>
        </a>
    </div>

    <div class="card shadow p-4">

        <table class="table table-hover align-middle text-center">
            <thead>
                <tr>
                    <th>Médico Responsable</th>
                    <th>Vacuna</th>
                    <th>Fecha Aplicación</th>
                    <th>Fecha Refuerzo</th>
                    <th>Estado</th>
  
                </tr>
            </thead>

            <tbody>
                <tr th:each="v : ${vacunas}">

                    <td th:text="${v.medico.nombre + ' ' + v.medico.apellido}"></td>
                    
                    <td class="fw-bold text-dark" th:text="${v.nombre}"></td>

                    <td th:text="${v.fechaAplicacion}"></td>

                    <td>
                        <span th:text="${v.fechaRefuerzo != null ? v.fechaRefuerzo : 'N/A'}"></span>
                    </td>

                    <td>
                        <span th:if="${v.estado.name() == 'VIGENTE'}"
                              class="badge badge-activo">Vigente</span>

                        <span th:if="${v.estado.name() == 'VENCIDA'}"
                              class="badge badge-vencido">Vencida</span>

                        <span th:if="${v.estado.name() == 'PROXIMA'}"
                              class="badge badge-proximo">Próxima</span>
                    </td>

                    

                </tr>

                <tr th:if="${#lists.isEmpty(vacunas)}">
                    <td colspan="5" class="py-4 text-muted">
                        <i class="bi bi-info-circle me-1"></i> No hay vacunas registradas en el historial
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

    <div class="text-center mt-4 text-muted small">
        SaludSync - Panel de Consulta Médica
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
