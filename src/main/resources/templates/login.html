<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - SaludSync</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-4">Iniciar Sesión</h3>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" name="correo" class="form-control" required>
            </div>

            <div class="mb-3">

                <label class="form-label">Contraseña</label>

                <div class="input-group">

                    <input type="password" id="contrasena" name="contrasena" class="form-control" required>

                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('contrasena')">
                        👁
                    </button>

                </div>

            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Ingresar
                </button>
            </div>

        </form>

        <div class="text-center mt-3">
            <a th:href="@{/cuenta/registro}" class="btn btn-outline-success w-100">
                Crear Cuenta
            </a>
        </div>

        <div class="text-center mt-2">
            <a th:href="@{/login/recuperar}" class="btn btn-link">
                ¿Olvidaste tu contraseña?
            </a>
        </div>

        <div class="text-danger text-center mt-2" th:text="${error}"></div>

    </div>

    <script>

        function togglePassword(id) {

            const input = document.getElementById(id)

            if (input.type === "password") {
                input.type = "text"
            } else {
                input.type = "password"
            }

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
