<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .login-container {
            height: 100vh;
        }

        /* Lado Izquierdo (Branding) */
        .brand-section {
            background-color: #E0F2F1;
            /* Color verde menta claro de la imagen */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            /* Opcional: textura sutil */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .brand-logo {
            max-width: 250px;
            margin-bottom: 20px;
        }

        .brand-section h1 {
            color: #004d40;
            font-weight: 700;
            font-size: 2.5rem;
        }

        .brand-section p {
            color: #00796b;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Lado Derecho (Imagen/Formulario) */
        .image-section {
            background: url('imagenes/chica1.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* El Card que flota sobre el fondo o sustituye el botón "Iniciar Sesión" */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }

        .btn-primary {
            background-color: #5bc0be;
            /* Color similar al botón de la imagen */
            border: none;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #4a9e9c;
        }

        .btn-outline-success {
            color: #2e7d32;
            border-color: #2e7d32;
        }

        /* Ajuste para móviles */
        @media (max-width: 768px) {
            .image-section {
                display: none;
            }

            .brand-section {
                height: 100vh;
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid p-0">
        <div class="row g-0 login-container">

            <div class="col-md-6 brand-section">
                <div class="mb-3">
                    <img src="imagenes/descarga (1).png" width="80" alt="Logo">
                </div>
                <h1>Hospital <span style="color: #4CAF50;">SaludSync</span></h1>
                <p>Salvando vidas con innovación y compromiso</p>

                <div class="login-card">
                    <h3 class="text-center mb-4" style="color: #333;">Iniciar Sesión</h3>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold">Correo electrónico</label>
                            <input type="email" name="correo" class="form-control" placeholder="nombre@ejemplo.com"
                                required>
                        </div>

                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold">Contraseña</label>
                            <div class="input-group">
                                <input type="password" id="contrasena" name="contrasena" class="form-control"
                                    placeholder="••••••••" required>
                                <button type="button" class="btn btn-outline-secondary"
                                    onclick="togglePassword('contrasena')">
                                    👁
                                </button>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary text-white">
                                Ingresar
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/cuenta/registro}" class="btn btn-outline-success w-100">
                            Crear Cuenta
                        </a>
                    </div>

                    <div class="text-center mt-2">
                        <a th:href="@{/login/recuperar}" class="btn btn-link text-decoration-none"
                            style="color: #666; font-size: 0.9rem;">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <div class="text-danger text-center mt-2" th:text="${error}"></div>
                </div>
            </div>

            <div class="col-md-6 image-section">
            </div>

        </div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
