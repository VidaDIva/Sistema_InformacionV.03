<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Recuperar Contraseña - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2F1; /* Verde menta de SaludSync */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .recovery-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .brand-text {
            color: #00796b;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            display: block;
            text-align: left;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #eef2f2;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #5bc0be;
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.15);
            outline: none;
        }

        .btn-primary {
            background-color: #5bc0be;
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            background-color: #4a9e9c;
            transform: translateY(-1px);
        }

        .back-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #00796b;
        }
    </style>
</head>

<body>

    <div class="recovery-card">
        <div class="icon-box">
            <i class="bi bi-key"></i>
        </div>

        <h2 class="brand-text">SaludSync</h2>
        <h4 class="text-secondary fw-semibold mb-2">¿Olvidaste tu clave?</h4>
        <p class="text-muted small mb-4">
            Ingresa tu correo electrónico y te enviaremos un código para restablecer tu contraseña.
        </p>

        <form th:action="@{/login/recuperar}" method="post">
            
            <div class="mb-4">
                <label class="form-label ms-1">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0 bg-transparent text-muted" style="border-radius: 12px 0 0 12px; border: 2px solid #eef2f2;">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email" 
                           name="correo" 
                           class="form-control border-start-0" 
                           placeholder="nombre@ejemplo.com" 
                           style="border-radius: 0 12px 12px 0; border: 2px solid #eef2f2;"
                           required>
                </div>
            </div>

            <div class="d-grid shadow-sm">
                <button type="submit" class="btn btn-primary text-white">
                    Enviar Código <i class="bi bi-send-fill ms-2"></i>
                </button>
            </div>

        </form>

        <div class="text-danger mt-3 small fw-bold" th:text="${error}"></div>

        <hr class="my-4" style="opacity: 0.1;">

        <div class="text-center">
            <a th:href="@{/login}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
