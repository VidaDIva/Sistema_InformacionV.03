<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard Paciente - SaludSync</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">SaludSync - Paciente</span>

        <a th:href="@{/logout}" class="btn btn-light">
            Cerrar sesión
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Tarjeta de bienvenida -->
    <div class="card shadow p-4 mb-4 d-flex align-items-center">
        <div class="d-flex align-items-center w-100">

            <div>
                <h4>Bienvenido</h4>

                <p>
                    <strong>Nombre:</strong>
                    <span th:text="${usuario.nombre}"></span>
                </p>

                <p>
                    <strong>Correo:</strong>
                    <span th:text="${usuario.correo}"></span>
                </p>
            </div>

            <!-- Foto perfil -->
            <img th:if="${usuario.imagen != null}"
                 th:src="@{'/sistema_informacion/uploads/Paciente/' + ${usuario.imagen}}"
                 class="rounded-circle ms-auto"
                 alt="Foto de perfil"
                 style="width:80px; height:80px; object-fit:cover; border:2px solid #007bff;">

        </div>
    </div>

    <!-- Opciones del paciente -->
    <div class="row">

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Citas Médicas</h5>
                <a th:href="@{/paciente/citas}" class="btn btn-outline-primary">
                    Ver citas
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Agendar Cita</h5>
                <a th:href="@{/paciente/agendar-cita}" class="btn btn-success">
                    Agendar
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Documentos Médicos</h5>
                <a th:href="@{/paciente/documentos}" class="btn btn-outline-primary">
                    Ver documentos
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Subir Documento</h5>
                <a th:href="@{/paciente/subir-documento}" class="btn btn-warning">
                    Subir archivo
                </a>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
