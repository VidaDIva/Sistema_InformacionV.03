<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Subir Documento - SaludSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-dark: #004d40;
            --accent-teal: #5bc0be;
            --bg-light: #f4fbfb;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Poppins', sans-serif;
            color: #333;
        }

        .card-upload {
            max-width: 800px;
            margin: 50px auto;
            padding: 45px;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.08);
            border-top: 8px solid var(--accent-teal);
            /* Detalle turquesa */
        }

        .section-header {
            border-bottom: 2px solid #f0f7f6;
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .section-header h2 {
            color: var(--primary-dark);
            font-weight: 700;
        }

        /* Estilo de Inputs y Selects */
        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e0f2f1;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.1);
        }

        /* Zona de adjunto especial */
        .file-upload-wrapper {
            background-color: #f8fdfd;
            border: 2px dashed var(--accent-teal);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .file-upload-wrapper:hover {
            background-color: #f0f9f8;
        }

        .upload-icon {
            font-size: 2.5rem;
            color: var(--accent-teal);
            margin-bottom: 10px;
        }

        /* Botones SaludSync */
        .btn-upload {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 35px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-upload:hover {
            background-color: var(--accent-teal);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 77, 64, 0.2);
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 12px 35px;
            font-weight: 600;
            color: #666;
            border: 2px solid #eee;
        }

        .btn-cancel:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card card-upload">

            <div class="section-header text-center">
                <h2><i class="bi bi-file-earmark-medical me-2 text-teal" style="color: var(--accent-teal);"></i>Subir
                    Documento Médico</h2>
                <p class="text-muted">Adjunte sus resultados o fórmulas para compartirlos con su médico.</p>
            </div>

            <form th:action="@{/paciente/guardar-documento}" method="post" enctype="multipart/form-data">

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-tag me-2"></i>Tipo de Documento</label>
                        <select name="tipoDocumento" class="form-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Orden Médica">Orden Médica</option>
                            <option value="Historial Clínico">Historial Clínico</option>
                            <option value="Resultados Laboratorio">Resultados Laboratorio</option>
                            <option value="Radiografía">Radiografía</option>
                            <option value="Fórmula Médica">Fórmula Médica</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-calendar-check me-2"></i>Cita Relacionada</label>
                        <select name="citaId" class="form-select" required>
                            <option value="" disabled selected>Seleccione una cita...</option>
                            <option th:each="c : ${citas}" th:value="${c.id}"
                                th:text="${'Dr(a). ' + c.doctor.nombre + ' ' + c.doctor.apellido + ' - ' + #temporals.format(c.fecha,'dd/MM/yyyy')}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-4">
                        <label class="form-label"><i class="bi bi-pencil-square me-2"></i>Nota / Descripción</label>
                        <textarea name="nota" rows="3" class="form-control"
                            placeholder="Ej: Resultados del examen de sangre solicitado en la última consulta..."
                            required></textarea>
                    </div>

                    <div class="col-md-12 mb-4">
                        <div class="file-upload-wrapper">
                            <i class="bi bi-cloud-arrow-up upload-icon d-block"></i>
                            <label class="form-label d-block">Seleccione su archivo (PDF, PNG, JPG)</label>
                            <input type="file" name="archivo" class="form-control" accept=".pdf,.png,.jpg,.jpeg"
                                required>
                            <small class="text-muted mt-2 d-block">Asegúrese de que el documento sea legible.</small>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex flex-column flex-sm-row justify-content-center gap-3">
                    <button type="submit" class="btn btn-upload shadow-sm">
                        <i class="bi bi-cloud-check me-2"></i>Subir Documento
                    </button>

                    <a th:href="@{/paciente/home}" class="btn btn-cancel text-center">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>

        <footer class="text-center pb-5 text-muted small">
            <i class="bi bi-shield-lock me-1"></i> Sus documentos están protegidos y solo serán visibles por usted y su
            médico.
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
