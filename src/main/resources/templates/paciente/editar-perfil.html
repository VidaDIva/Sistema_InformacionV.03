<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - SaludSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #004d40;
            --accent-teal: #5bc0be;
            --bg-light: #f4fbfb;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Poppins', sans-serif;
            color: #333;
        }

        .card-edit {
            max-width: 800px;
            margin: 50px auto;
            padding: 45px;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.08);
            border-top: 8px solid var(--primary-dark);
        }

        .section-header {
            border-bottom: 2px solid #f0f7f6;
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .section-header h2 {
            color: var(--primary-dark);
            font-weight: 700;
            display: flex;
            align-items: center;
        }

        .section-header h2 i {
            margin-right: 15px;
            color: var(--accent-teal);
        }

        /* Estilo de Inputs */
        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e0f2f1;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.1);
            background-color: #fff;
        }

        /* Botones */
        .btn-save {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 35px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: var(--accent-teal);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 77, 64, 0.2);
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 12px 35px;
            font-weight: 600;
            color: #666;
            border: 2px solid #eee;
            background: transparent;
        }

        .btn-cancel:hover {
            background-color: #f8f9fa;
            color: #333;
        }

        .upload-box {
            background-color: #f8fdfd;
            border: 2px dashed #d9efee;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card card-edit">
            <div class="section-header text-center text-md-start">
                <h2><i class="bi bi-person-gear"></i> Actualizar Perfil</h2>
                <p class="text-muted small">Modifique sus datos personales y profesionales</p>
            </div>

            <form th:action="@{/paciente/perfil/guardar}" th:object="${paciente}" method="post"
                enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}">

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-person me-2"></i>Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ingrese su nombre">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-person-check me-2"></i>Apellido</label>
                        <input type="text" class="form-control" th:field="*{apellido}"
                            placeholder="Ingrese su apellido">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-telephone me-2"></i>Celular</label>
                        <input type="text" class="form-control" th:field="*{celular}" placeholder="Ej: 300 123 4567">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-envelope me-2"></i>Correo Electrónico</label>
                        <input type="email" class="form-control" th:field="*{correo}" placeholder="correo@ejemplo.com">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label"><i class="bi bi-geo-alt me-2"></i>Dirección de Consultorio</label>
                        <input type="text" class="form-control" th:field="*{direccion}"
                            placeholder="Calle, Número, Ciudad">
                    </div>

                    <div class="col-md-12">
                        <div class="upload-box">
                            <label class="form-label d-block mb-2">
                                <i class="bi bi-image me-2"></i>Cambiar Foto de Perfil
                            </label>
                            <input type="file" name="foto" class="form-control" accept="image/*">
                            <small class="text-muted mt-2 d-block">Formatos permitidos: JPG, PNG. Máx 2MB.</small>
                        </div>
                    </div>
                </div>

                <div class="mt-5 d-flex flex-column flex-sm-row justify-content-center gap-3">
                    <button type="submit" class="btn btn-save shadow-sm">
                        <i class="bi bi-check-lg me-2"></i>Guardar Cambios
                    </button>

                    <a th:href="@{/paciente/perfil}" class="btn btn-cancel text-center">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>

        <footer class="text-center pb-5 text-muted">
            <small>© 2026 SaludSync - Gestión de Perfil Segura</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
