<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registro - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2F1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .data-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.1);
            width: 100%;
            max-width: 600px;
            /* Un poco más ancho para que los campos en fila respiren */
            padding: 40px;
        }

        .brand-text {
            color: #00796b;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #5bc0be;
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.2);
            outline: none;
        }

        .btn-primary {
            background-color: #5bc0be;
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            background-color: #4a9e9c;
            transform: translateY(-1px);
        }

        .text-secondary {
            font-weight: 600;
        }

        /* Estilo para los divisores de sección opcionales */
        .section-divider {
            border-top: 1px solid #e0f2f1;
            margin: 25px 0;
        }
    </style>
</head>

<body>

    <div class="data-card">
        <div class="text-center mb-4">
            <h2 class="brand-text">SaludSync</h2>
            <h4 class="text-secondary text-muted">Completar Datos Personales</h4>
            <p class="text-muted small">Llena la información para finalizar tu perfil profesional</p>
        </div>

        <form th:action="@{/cuenta/registro-datos}" method="post" th:object="${crear}" enctype="multipart/form-data">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan David" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Apellido <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: Pérez" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Celular <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{celular}" class="form-control" placeholder="300 000 0000" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Fecha de nacimiento <span class="text-danger">*</span></label>
                    <input type="date" th:field="*{fechaNacimiento}" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección <span class="text-danger">*</span></label>
                <input type="text" th:field="*{direccion}" class="form-control" placeholder="Calle, Carrera, Barrio..."
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de usuario <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{cargo.id}" required>
                    <option value="">Seleccione una opción</option>
                    <option th:each="c : ${cargos}" th:value="${c.id}" th:text="${c.cargo}">
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label for="formFile" class="form-label">Foto de perfil <span class="text-danger">*</span></label>
                <input type="file" class="form-control" id="formFile" name="file" accept=".jpg,.png" required>
                <div class="form-text mt-2 text-info d-flex align-items-center">
                    <i class="bi bi-info-circle me-2"></i>
                    <span>Se recomienda subir una foto clara de tu rostro.</span>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary text-white shadow-sm">
                    Siguiente
                </button>
                <a href="javascript:history.back()"
                    class="btn btn-link text-muted btn-sm text-decoration-none text-center">
                    <i class="bi bi-arrow-left"></i> Volver atrás
                </a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
