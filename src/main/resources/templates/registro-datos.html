<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro - Datos</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-4">Datos Personales</h3>

        <form th:action="@{/cuenta/registro-datos}" 
              method="post" 
              th:object="${crear}"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Apellido <span class="text-danger">*</span></label>
                <input type="text" th:field="*{apellido}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Celular <span class="text-danger">*</span></label>
                <input type="text" th:field="*{celular}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección <span class="text-danger">*</span></label>
                <input type="text" th:field="*{direccion}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de nacimiento <span class="text-danger">*</span></label>
                <input type="date" th:field="*{fechaNacimiento}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de usuario <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{cargo.id}" required>

                    <option value="">Seleccione una opción</option>

                    <option th:each="c : ${cargos}"
                            th:value="${c.id}"
                            th:text="${c.cargo}">
                    </option>

                </select>

            </div>


            <!-- 🔥 NUEVO CAMPO PARA ARCHIVO -->
            <div class="mb-3">
                <label for="formFile" class="form-label">Imagen <span class="text-danger">*</span></label>
                <input type="file" 
                       class="form-control" 
                       id="formFile" 
                       name="file"
                       accept=".pdf,.jpg,.png" 
                       required>
            </div>



            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Continuar
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
