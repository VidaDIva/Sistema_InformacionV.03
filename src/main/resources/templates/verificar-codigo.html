<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Verificación - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2F1;
            /* Verde menta coherente */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verification-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .brand-text {
            color: #00796b;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .form-control {
            border-radius: 12px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #5bc0be;
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.2);
            outline: none;
        }

        .btn-primary {
            background-color: #5bc0be;
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            background-color: #4a9e9c;
            transform: translateY(-1px);
        }

        .resend-link {
            color: #00796b;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .resend-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="verification-card">
        <div class="icon-box">
            <i class="bi bi-shield-lock"></i>
        </div>

        <h2 class="brand-text">SaludSync</h2>
        <h4 class="text-secondary fw-semibold mb-2">Verificar Código</h4>
        <p class="text-muted small mb-4">Hemos enviado un código de seguridad a tu correo electrónico.</p>

        <form th:action="@{/login/verificar-codigo}" method="post">

            <div class="mb-4">
                <input type="text" name="codigo" class="form-control" placeholder="000000" maxlength="6" required
                    autocomplete="one-time-code">
            </div>

            <div class="d-grid shadow-sm">
                <button type="submit" class="btn btn-primary text-white">
                    Verificar Cuenta
                </button>
            </div>

        </form>

        <div class="text-danger mt-3 small fw-bold" th:text="${error}"></div>

        <hr class="my-4" style="opacity: 0.1;">

        <p class="text-muted small mb-0">
            ¿No recibiste el código? <br>
            <a href="#" class="resend-link">Reenviar código</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
