<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>PQRS - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2F1;
        }

        .card-form {
            max-width: 700px;
            margin: auto;
            margin-top: 40px;
            border-radius: 20px;
            padding: 30px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background-color: #5bc0be;
            border: none;
        }

        .btn-primary:hover {
            background-color: #4a9e9c;
        }

        h2 {
            color: #00796b;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card-form">

        <div class="text-center mb-4">
            <h2>SaludSync</h2>
            <p class="text-muted">Formulario PQRS</p>
        </div>

        <form th:action="@{/pqrs/guardar}" th:object="${pqrs}" method="post">

            <!-- Tipo Usuario -->
            <div class="mb-3">
                <label class="form-label">Tipo de usuario</label>
                <select id="tipoUsuario" th:field="*{tipoUsuario}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="Paciente">Paciente</option>
                    <option value="Medico">Médico</option>
                    <option value="Familiar">Familiar</option>
                    <option value="Anonimo">Anónimo</option>
                </select>
            </div>

            <!-- Nombre -->
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
            </div>

            <!-- Tipo Documento -->
            <div class="mb-3">
                <label class="form-label">Tipo de documento</label>
                <select id="tipoDocumento" th:field="*{tipoDocumento}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="CC">CC</option>
                    <option value="TI">TI</option>
                    <option value="CE">CE</option>
                </select>
            </div>

            <!-- Número Documento -->
            <div class="mb-3">
                <label class="form-label">Número de documento</label>
                <input type="text" id="numeroDocumento" th:field="*{numeroDocumento}" class="form-control">
            </div>

            <!-- Teléfono -->
            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" th:field="*{telefono}" class="form-control">
            </div>

            <!-- Correo -->
            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" th:field="*{correo}" class="form-control">
            </div>

            <!-- Área -->
            <div class="mb-3">
                <label class="form-label">Área del hospital</label>
                <select th:field="*{areaHospital}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="Urgencias">Urgencias</option>
                    <option value="Consulta externa">Consulta externa</option>
                    <option value="UCI">UCI</option>
                    <option value="Hospitalizacion">Hospitalización</option>
                </select>
            </div>

            <!-- Fecha -->
            <div class="mb-3">
                <label class="form-label">Fecha del incidente</label>
                <input type="date" th:field="*{fechaIncidente}" class="form-control">
            </div>

            <!-- Tipo Solicitud -->
            <div class="mb-3">
                <label class="form-label">Tipo de solicitud</label>
                <select th:field="*{tipoSolicitud}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="Peticion">Petición</option>
                    <option value="Queja">Queja</option>
                    <option value="Reclamo">Reclamo</option>
                    <option value="Sugerencia">Sugerencia</option>
                    <option value="Agradecimiento">Agradecimiento</option>
                </select>
            </div>

            <!-- Descripción -->
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
            </div>

            <!-- Gravedad -->
            <div class="mb-3">
                <label class="form-label">Nivel de gravedad</label>
                <select th:field="*{nivelGravedad}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="Baja">Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                </select>
            </div>

            <!-- Ubicación -->
            <div class="mb-3">
                <label class="form-label">Ubicación</label>
                <input type="text" th:field="*{ubicacion}" class="form-control">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send"></i> Enviar PQRS
                </button>
                <div class="text-danger text-center small mt-2" th:text="${error}"></div>

                <a th:href="@{/seleccionar-rol}" class="btn btn-link text-muted btn-sm text-decoration-none text-center mt-2">
                    <i class="bi bi-arrow-left"></i> Volver al inicio
                </a>
            </div>
            


        </form>

    </div>
</div>

<!-- SCRIPT DINÁMICO 🔥 -->
<script>
document.getElementById("tipoUsuario").addEventListener("change", function() {

    const tipo = this.value;

    const nombre = document.getElementById("nombre");
    const tipoDoc = document.getElementById("tipoDocumento");
    const numero = document.getElementById("numeroDocumento");

    if (tipo === "Anonimo") {

        const nombres = ["Anonimo", "Usuario", "PacienteX", "Visitante"];
        const randomNombre = nombres[Math.floor(Math.random() * nombres.length)] + Math.floor(Math.random() * 1000);

        const randomNumero = Math.floor(100000000 + Math.random() * 900000000);

        nombre.value = randomNombre;
        tipoDoc.value = "CC";
        numero.value = randomNumero;

        nombre.readOnly = true;
        tipoDoc.disabled = true;
        numero.readOnly = true;

    } else {

        nombre.readOnly = false;
        tipoDoc.disabled = false;
        numero.readOnly = false;

        nombre.value = "";
        numero.value = "";
    }
});
</script>

</body>
</html>
