<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Gestión de Insumos - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f9f8;
            min-height: 100vh;
        }

        .main-container {
            padding-top: 50px;
            padding-bottom: 50px;
        }

        /* Título y Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Tabla Estilizada */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 77, 64, 0.05);
            border: none;
        }

        .table thead {
            background-color: #263238;
            color: white;
            border: none;
        }

        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding: 15px;
            border: none;
        }

        .table td {
            padding: 15px;
            vertical-align: middle;
            font-size: 0.9rem;
            color: #455a64;
        }

        /* Botones */
        .btn-new {
            background-color: #00796b;
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
        }

        .btn-new:hover {
            background-color: #004d40;
            color: white;
            transform: translateY(-2px);
        }

        .btn-home {
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: #00796b;
            color: white;
        }

        .btn-delete {
            border-radius: 8px;
            color: #d32f2f;
            background-color: #ffebee;
            border: none;
            padding: 6px 12px;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background-color: #d32f2f;
            color: white;
        }

        /* Badges de Estado */
        .badge-entregado {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .badge-usado {
            background-color: #fff3e0;
            color: #ef6c00;
        }

        .badge-desechado {
            background-color: #eceff1;
            color: #546e7a;
        }
    </style>
</head>

<body>

    <div class="container main-container">

        <div class="page-header">
            <div class="title-group">
                <a th:href="@{/admin/home}" class="btn-home shadow-sm">
                    <i class="bi bi-house-door-fill"></i>
                </a>
                <h3 class="fw-bold m-0" style="color: #263238;">Inventario de Insumos</h3>
            </div>

            <a th:href="@{/admin/insumos/nuevo}" class="btn-new shadow-sm">
                <i class="bi bi-plus-lg me-2"></i>Nuevo Insumo
            </a>
        </div>

        <div class="table-container shadow-sm">
            <table class="table table-hover m-0">
                <thead class="text-center">
                    <tr>
                        <th><i class="bi bi-person me-2"></i>Médico</th>
                        <th><i class="bi bi-box-seam me-2"></i>Insumo</th>
                        <th>Cant.</th>
                        <th>Fecha</th>
                        <th>Área</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody class="text-center">
                    <tr th:each="i : ${insumos}">
                        <td class="fw-bold" th:text="${i.medico.nombre + ' ' + i.medico.apellido }"></td>
                        <td th:text="${i.nombreInsumo}"></td>
                        <td>
                            <span class="badge rounded-pill bg-light text-dark px-3" th:text="${i.cantidad}"></span>
                        </td>
                        <td th:text="${i.fechaEntrega}"></td>
                        <td>
                            <small class="text-uppercase fw-semibold" th:text="${i.area}"></small>
                        </td>

                        <td>
                            <span th:text="${i.estado}"
                                th:classappend="${i.estado == 'ENTREGADO' ? 'badge-entregado' : (i.estado == 'USADO' ? 'badge-usado' : 'badge-desechado')}"
                                class="badge px-3 py-2">
                            </span>
                        </td>

                        <td>
                            <a th:href="@{'/admin/insumos/eliminar/' + ${i.id}}" class="btn-delete"
                                onclick="return confirm('¿Está seguro de eliminar este registro del inventario?')">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(insumos)}">
                        <td colspan="7" class="py-5 text-muted">
                            <i class="bi bi-info-circle fs-2 d-block mb-2"></i>
                            No hay insumos registrados actualmente.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <p class="text-muted small">SaludSync Admin v2.0 - Gestión de Recursos Hospitalarios</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
