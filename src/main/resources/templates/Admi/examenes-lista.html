<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Control de Exámenes - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f9f8;
            min-height: 100vh;
        }

        .main-container {
            padding-top: 50px;
            padding-bottom: 50px;
        }

        /* Título y Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Tabla Estilizada */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 77, 64, 0.05);
            border: none;
        }

        .table thead {
            background-color: #263238;
            color: white;
            border: none;
        }

        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding: 15px;
            border: none;
        }

        .table td {
            padding: 15px;
            vertical-align: middle;
            font-size: 0.9rem;
            color: #455a64;
        }

        /* Botones */
        .btn-new {
            background-color: #00796b;
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            text-decoration: none;
        }

        .btn-new:hover {
            background-color: #004d40;
            color: white;
            transform: translateY(-2px);
        }

        .btn-home {
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: #00796b;
            color: white;
        }

        .btn-delete {
            border-radius: 8px;
            color: #d32f2f;
            background-color: #ffebee;
            border: none;
            padding: 8px 12px;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-delete:hover {
            background-color: #d32f2f;
            color: white;
        }

        /* Badges de Estado Mejorados */
        .badge-status {
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class="container main-container">

        <div class="page-header">
            <div class="title-group">
                <a th:href="@{/admin/home}" class="btn-home shadow-sm" title="Ir al Inicio">
                    <i class="bi bi-house-door-fill"></i>
                </a>
                <h3 class="fw-bold m-0" style="color: #263238;">Historial de Exámenes</h3>
            </div>
            
            <a th:href="@{/admin/examenes/nuevo}" class="btn-new shadow-sm">
                <i class="bi bi-plus-lg me-2"></i>Nuevo Examen
            </a>
        </div>

        <div class="table-container shadow-sm">
            <table class="table table-hover m-0">
                <thead class="text-center">
                    <tr>
                        <th><i class="bi bi-person-badge me-2"></i>Médico</th>
                        <th><i class="bi bi-vial me-2"></i>Examen</th>
                        <th>Realización</th>
                        <th>Vencimiento</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody class="text-center">
                    <tr th:each="e : ${examenes}">
                        <td class="fw-bold" th:text="${e.medico.nombre + ' ' + e.medico.apellido}"></td>
                        <td th:text="${e.tipoExamen}"></td>
                        <td th:text="${e.fechaRealizacion}"></td>
                        <td th:text="${e.fechaVencimiento}"></td>

                        <td>
                            <span th:if="${e.estado.name() == 'VIGENTE'}" 
                                  class="badge-status bg-success-subtle text-success">
                                  <i class="bi bi-check-circle-fill me-1"></i> VIGENTE
                            </span>
                            <span th:if="${e.estado.name() == 'VENCIDO'}" 
                                  class="badge-status bg-danger-subtle text-danger">
                                  <i class="bi bi-x-circle-fill me-1"></i> VENCIDO
                            </span>
                            <span th:if="${e.estado.name() == 'PROXIMO'}" 
                                  class="badge-status bg-warning-subtle text-warning-emphasis">
                                  <i class="bi bi-clock-history me-1"></i> PRÓXIMO
                            </span>
                        </td>

                        <td>
                            <a th:href="@{'/admin/examenes/eliminar/' + ${e.id}}"
                               class="btn-delete"
                               onclick="return confirm('¿Desea eliminar este registro de examen?')">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(examenes)}">
                        <td colspan="6" class="py-5 text-muted">
                            <i class="bi bi-clipboard2-x fs-2 d-block mb-2"></i>
                            No hay exámenes registrados en el historial.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4 text-muted small">
            <i class="bi bi-shield-check me-1"></i> Sistema de Gestión SaludSync - 2026
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
