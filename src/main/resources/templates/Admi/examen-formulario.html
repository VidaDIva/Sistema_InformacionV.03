<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nuevo Examen - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f9f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-examen {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 77, 64, 0.08);
            background-color: #ffffff;
            overflow: hidden;
        }

        .card-header-accent {
            background: linear-gradient(90deg, #00796b, #5bc0be);
            height: 8px;
        }

        .form-label {
            font-weight: 600;
            color: #263238;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #e0f2f1;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #5bc0be;
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.1);
        }

        .btn-save {
            background-color: #00796b;
            color: white;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #004d40;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 121, 107, 0.3);
        }

        .btn-back {
            background-color: #f8f9fa;
            color: #666;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-home {
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: #00796b;
            color: white;
            transform: scale(1.1);
        }

        .title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="card card-examen">
                    <div class="card-header-accent"></div>
                    <div class="p-5">

                        <div class="title-container">
                            <h3 class="fw-bold m-0" style="color: #004d40;">
                                <i class="bi bi-clipboard2-pulse-fill me-2" style="color: #5bc0be;"></i> Registrar
                                Examen
                            </h3>
                            <a th:href="@{/admin/home}" class="btn-home shadow-sm" title="Ir al Inicio">
                                <i class="bi bi-house-door-fill"></i>
                            </a>
                        </div>

                        <form th:action="@{/admin/examenes/guardar}" th:object="${examen}" method="post">

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Médico Solicitante</label>
                                    <select th:field="*{medico.id}" class="form-select" required>
                                        <option value="">Seleccione médico</option>
                                        <option th:each="m : ${medicos}" th:value="${m.id}"
                                            th:text="${m.nombre + ' ' + m.apellido}">
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Tipo de Examen</label>
                                    <select th:field="*{tipoExamen}" class="form-select" required>
                                        <option value="">Seleccione tipo</option>
                                        <option value="Hemograma">Hemograma</option>
                                        <option value="Perfil Lipídico">Perfil Lipídico</option>
                                        <option value="Glucosa">Glucosa</option>
                                        <option value="Radiografía">Radiografía</option>
                                        <option value="Electrocardiograma">Electrocardiograma</option>
                                    </select>
                                </div>

                                <div class="col-md-12 mb-4">
                                    <label class="form-label">Fecha de Realización</label>
                                    <input type="date" th:field="*{fechaRealizacion}" class="form-control" required>
                                </div>

                                <div class="col-md-12 mb-4">
                                    <label class="form-label">Observaciones Médicas</label>
                                    <textarea th:field="*{observaciones}" class="form-control" rows="3"
                                        placeholder="Escriba hallazgos o notas adicionales..."></textarea>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center pt-3">
                                <a th:href="@{/admin/examenes}" class="btn-back">
                                    <i class="bi bi-arrow-left me-2"></i> Volver
                                </a>
                                <button type="submit" class="btn-save shadow-sm">
                                    <i class="bi bi-check2-circle me-2"></i> Guardar Examen
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

                <div class="text-center mt-4 text-muted small">
                    SaludSync v2.0 - Gestión de Diagnósticos Médicos
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
