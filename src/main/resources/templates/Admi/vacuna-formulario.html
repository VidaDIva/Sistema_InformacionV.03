<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nueva Vacuna - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f9f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-vacuna {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 77, 64, 0.08);
            background-color: #ffffff;
            overflow: hidden;
        }

        .card-header-accent {
            background: linear-gradient(90deg, #00796b, #5bc0be);
            height: 8px;
        }

        .form-label {
            font-weight: 600;
            color: #263238;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #e0f2f1;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #5bc0be;
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.1);
        }

        .btn-save {
            background-color: #00796b;
            color: white;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #004d40;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 121, 107, 0.3);
        }

        .btn-back {
            background-color: #f8f9fa;
            color: #666;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .btn-home {
            background-color: #e0f2f1;
            color: #00796b;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-home:hover {
            background-color: #00796b;
            color: white;
            transform: scale(1.1);
        }

        .title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                
                <div class="card card-vacuna">
                    <div class="card-header-accent"></div>
                    <div class="p-5">
                        
                        <div class="title-container">
                            <h3 class="fw-bold m-0" style="color: #004d40;">
                                <i class="bi bi-patch-check-fill me-2" style="color: #5bc0be;"></i> Registrar Vacuna
                            </h3>
                            <a th:href="@{/admin/home}" class="btn-home shadow-sm" title="Ir al Inicio">
                                <i class="bi bi-house-door-fill"></i>
                            </a>
                        </div>

                        <p class="text-muted mb-4 small">Complete la información para el registro oficial de inmunización.</p>

                        <form th:action="@{/admin/vacunas/guardar}" th:object="${vacuna}" method="post">
                            
                            <div class="mb-4">
                                <label class="form-label">Médico Responsable</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px; border-color: #e0f2f1;">
                                        <i class="bi bi-person-badge text-muted"></i>
                                    </span>
                                    <select th:field="*{medico.id}" class="form-select border-start-0" style="border-radius: 0 10px 10px 0;" required>
                                        <option value="">Seleccione el profesional</option>
                                        <option th:each="m : ${medicos}"
                                                th:value="${m.id}"
                                                th:text="${m.nombre + ' ' + m.apellido}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Tipo de Biológico (Vacuna)</label>
                                <select th:field="*{nombre}" class="form-select" required>
                                    <option value="">Seleccione una vacuna</option>
                                    <option value="COVID-19">COVID-19</option>
                                    <option value="Influenza">Influenza (Gripe)</option>
                                    <option value="Hepatitis B">Hepatitis B</option>
                                    <option value="Tétanos">Tétanos</option>
                                    <option value="Fiebre Amarilla">Fiebre Amarilla</option>
                                    <option value="Triple Viral">Triple Viral (SRP)</option>
                                    <option value="Varicela">Varicela</option>
                                    <option value="Neumococo">Neumococo</option>
                                    <option value="Virus del Papiloma Humano">VPH</option>
                                    <option value="Rabia">Rabia</option>
                                </select>
                            </div>

                            <div class="mb-5">
                                <label class="form-label">Fecha de Aplicación</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px; border-color: #e0f2f1;">
                                        <i class="bi bi-calendar-event text-muted"></i>
                                    </span>
                                    <input type="date" th:field="*{fechaAplicacion}" class="form-control border-start-0" style="border-radius: 0 10px 10px 0;" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center pt-3">
                                <a th:href="@{/admin/vacunas}" class="btn-back">
                                    <i class="bi bi-arrow-left me-2"></i> Volver a la lista
                                </a>
                                <button type="submit" class="btn-save shadow-sm">
                                    <i class="bi bi-save2 me-2"></i> Guardar Registro
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

                <div class="text-center mt-4 text-muted small">
                    <i class="bi bi-shield-lock-fill me-1"></i> Sistema de Gestión Segura SaludSync
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
