<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cambiar Contraseña - SaludSync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2F1; /* Verde menta de la marca */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .data-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .brand-text {
            color: #00796b;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #5bc0be;
            box-shadow: 0 0 0 0.25rem rgba(91, 192, 190, 0.2);
            outline: none;
        }

        .btn-primary {
            background-color: #5bc0be;
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            background-color: #4a9e9c;
            transform: translateY(-1px);
        }

        .progress {
            height: 6px;
            border-radius: 10px;
            background-color: #e9ecef;
        }

        .security-hint {
            font-size: 0.75rem;
            color: #6c757d;
            display: block;
            margin-top: 5px;
        }

        #texto1 {
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 5px;
            display: block;
        }

        .input-group-text {
            background-color: transparent;
            cursor: pointer;
            border-radius: 0 10px 10px 0 !important;
        }

        .input-group > .form-control {
            border-radius: 10px 0 0 10px !important;
        }
    </style>
</head>

<body>

    <div class="data-card">
        <div class="text-center mb-4">
            <h2 class="brand-text">SaludSync</h2>
            <h4 class="text-secondary fw-semibold">Nueva Contraseña</h4>
            <p class="text-muted small">Crea una clave que sea fácil de recordar pero segura.</p>
        </div>

        <form th:action="@{/login/cambiar-contrasena}" method="post">

            <div class="mb-3">
                <label class="form-label">Nueva Contraseña</label>
                <div class="input-group shadow-sm">
                    <input type="password" id="nuevaContrasena" name="nuevaContrasena" class="form-control"
                           onkeyup="medirSeguridad('nuevaContrasena','barra1','texto1')" 
                           placeholder="Escribe tu nueva clave" required>
                    <button type="button" class="btn btn-outline-secondary border-start-0" onclick="togglePassword('nuevaContrasena')">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <small class="security-hint mt-2 text-muted">
                    <i class="bi bi-shield-check"></i> Usa mayúsculas, números y símbolos.
                </small>

                <div class="progress mt-2">
                    <div id="barra1" class="progress-bar" role="progressbar" style="width:0%"></div>
                </div>
                <span id="texto1" class="text-muted">Sin contraseña</span>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirmar Contraseña</label>
                <div class="input-group shadow-sm">
                    <input type="password" id="confirmarContrasena" name="confirmarContrasena" class="form-control"
                           placeholder="Repite la clave" required>
                    <button type="button" class="btn btn-outline-secondary border-start-0" onclick="togglePassword('confirmarContrasena')">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary text-white shadow-sm">
                    Cambiar y acceder <i class="bi bi-check2-circle ms-2"></i>
                </button>
            </div>

        </form>

        <div class="text-danger text-center mt-3 small fw-bold" th:text="${error}"></div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = event.currentTarget.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function medirSeguridad(inputId, barraId, textoId) {
            const pass = document.getElementById(inputId).value;
            let fuerza = 0;

            if (pass.length >= 8) fuerza++;
            if (/[A-Z]/.test(pass)) fuerza++;
            if (/[0-9]/.test(pass)) fuerza++;
            if (/[^A-Za-z0-9]/.test(pass)) fuerza++;

            const barra = document.getElementById(barraId);
            const texto = document.getElementById(textoId);

            let porcentaje = (fuerza / 4) * 100;
            barra.style.width = porcentaje + "%";

            if (pass.length === 0) {
                barra.className = "progress-bar";
                texto.innerText = "Sin contraseña";
                texto.className = "text-muted";
            } else if (fuerza <= 1) {
                barra.className = "progress-bar bg-danger";
                texto.innerText = "Contraseña débil";
                texto.className = "text-danger";
            } else if (fuerza <= 3) {
                barra.className = "progress-bar bg-warning";
                texto.innerText = "Contraseña media";
                texto.className = "text-warning";
            } else {
                barra.className = "progress-bar bg-success";
                texto.innerText = "Contraseña fuerte";
                texto.className = "text-success";
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
