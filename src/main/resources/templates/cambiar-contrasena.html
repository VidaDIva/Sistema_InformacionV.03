<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cambiar Contraseña</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-4">Cambiar Contraseña</h3>

        <form th:action="@{/login/cambiar-contrasena}" method="post">

            <div class="mb-3">
                <label class="form-label">Nueva Contraseña</label>

                <div class="input-group">
                    <input type="password" id="nuevaContrasena" name="nuevaContrasena" class="form-control"
                        onkeyup="medirSeguridad('nuevaContrasena','barra1','texto1')" required>

                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('nuevaContrasena')">
                        👁
                    </button>
                </div>

                <span>
                    Consejo: usa mayúsculas, números y símbolos para mayor seguridad.
                </span>

                <div class="progress mt-2">
                    <div id="barra1" class="progress-bar" style="width:0%"></div>
                </div>

                <span id="texto1"></span>

            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar Contraseña</label>

                <div class="input-group">
                    <input type="password" id="confirmarContrasena" name="confirmarContrasena" class="form-control"
                        required>

                    <button type="button" class="btn btn-outline-secondary"
                        onclick="togglePassword('confirmarContrasena')">
                        👁
                    </button>
                </div>

            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Cambiar y acceder
                </button>
            </div>

        </form>

        <div class="text-danger text-center mt-2" th:text="${error}"></div>

    </div>

    <script>

        function togglePassword(id) {
            const input = document.getElementById(id)
            input.type = input.type === "password" ? "text" : "password"
        }

        function medirSeguridad(inputId, barraId, textoId) {

            const pass = document.getElementById(inputId).value
            let fuerza = 0

            if (pass.length >= 8) fuerza++
            if (/[A-Z]/.test(pass)) fuerza++
            if (/[0-9]/.test(pass)) fuerza++
            if (/[^A-Za-z0-9]/.test(pass)) fuerza++

            const barra = document.getElementById(barraId)
            const texto = document.getElementById(textoId)

            let porcentaje = (fuerza / 4) * 100
            barra.style.width = porcentaje + "%"

            if (fuerza <= 1) {
                barra.className = "progress-bar bg-danger"
                texto.innerText = "Contraseña débil"
            }
            else if (fuerza <= 3) {
                barra.className = "progress-bar bg-warning"
                texto.innerText = "Contraseña media"
            }
            else {
                barra.className = "progress-bar bg-success"
                texto.innerText = "Contraseña fuerte"
            }

        }

    </script>

</body>

</html>
